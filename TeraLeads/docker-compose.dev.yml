# Development Docker Compose Override
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.8'

services:
  frontend:
    volumes:
      - ./chatbot-frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    command: npm run dev

  backend:
    volumes:
      - ./chatbot-backend/src:/app/src
      - ./chatbot-backend/package.json:/app/package.json
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev

  ai-service:
    volumes:
      - ./chatbot-ai/src:/app/src
      - ./chatbot-ai/requirements.txt:/app/requirements.txt
    environment:
      - ENVIRONMENT=development
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

